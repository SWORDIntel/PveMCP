[project]
name = "vm-mcp"
version = "0.1.0"
requires-python = ">=3.10"
description = "Proxmox-oriented MCP server and CLI for VM lifecycle, orchestration, and host/guest operations"
dependencies = ["fastmcp"]
readme = "README.md"
license = { text = "MIT" }

[tool.pytest.ini_options]
pythonpath = ["src"]

[project.scripts]
vmctl = "vm_mcp.cli:main"
vm-mcp-server = "vm_mcp.mcp_server:main"
